{% extends 'base.html' %}

{% block title %}Payment Successful - HealthCare Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-5 border-0 shadow-lg">
            <div class="mb-4">
                <div class="bg-success-subtle text-success rounded-circle d-inline-flex align-items-center justify-content-center"
                    style="width: 100px; height: 100px;">
                    <i class="bi bi-check-lg display-3"></i>
                </div>
            </div>
            <h2 class="fw-bold mb-3">Payment Successful!</h2>
            <p class="text-muted mb-5">Your transaction has been processed securely. Your appointment is now confirmed.
            </p>

            <div class="d-grid gap-2">
                <a href="{% url 'patients:dashboard' %}" class="btn btn-primary fw-bold py-2">GO TO DASHBOARD</a>
                {% if payment %}
                <a href="{% url 'payments:download_receipt' payment.id %}" class="btn btn-outline-secondary fw-bold py-2">
                    <i class="bi bi-download me-2"></i>Download Receipt
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
